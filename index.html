<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400&family=Noto+Sans+Thai:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- QUIZ SCREEN -->
  <div id="quizScreen" class="quiz-screen">
    <div class="quiz-box">
      <p class="quiz-label">ก่อนเข้าชม กรุณาตอบคำถาม</p>
      <h2 class="quiz-question">ฉายาของพระริวกิวตอนบวชคือข้อไหน?</h2>
      <div class="quiz-options">
        <button class="quiz-opt" data-correct="false">สุพรรณบุรี</button>
        <button class="quiz-opt" data-correct="false">สุวรรณภูมิ</button>
        <button class="quiz-opt" data-correct="true">สุรวิโช</button>
        <button class="quiz-opt" data-correct="false">สุสุเปอร์โนวา</button>
      </div>
      <p class="quiz-feedback" id="quizFeedback"></p>
    </div>
  </div>

  <!-- CONFETTI CANVAS -->
  <canvas id="confetti" style="position:fixed;inset:0;pointer-events:none;z-index:999;display:none;"></canvas>

  <header>
    <div class="dev-credit">Dev by Sorrawich</div>
    <a href="admin.html" class="gear-btn" title="Admin">&#9881;</a>
    <nav class="menu" id="menu"></nav>
  </header>

  <main>

    <section id="display">
      <div class="section-quote">
        <blockquote>
          "Sometimes you will never know the true value of a moment until it becomes a memory."
          <cite>— Rewgill</cite>
        </blockquote>
      </div>
      <div class="all-grid" id="allMosaic">
        <div class="all-item a1"><div class="slide-cell"><img class="img-a" src="" alt="Display 1"><img class="img-b" src="" alt="Display 1"></div></div>
        <div class="all-item a2"><div class="slide-cell"><img class="img-a" src="" alt="Display 2"><img class="img-b" src="" alt="Display 2"></div></div>
        <div class="all-item a3"><div class="slide-cell"><img class="img-a" src="" alt="Display 3"><img class="img-b" src="" alt="Display 3"></div></div>
        <div class="all-item a4"><div class="slide-cell"><img class="img-a" src="" alt="Display 4"><img class="img-b" src="" alt="Display 4"></div></div>
        <div class="all-item a5"><div class="slide-cell"><img class="img-a" src="" alt="Display 5"><img class="img-b" src="" alt="Display 5"></div></div>
        <div class="all-item a6"><div class="slide-cell"><img class="img-a" src="" alt="Display 6"><img class="img-b" src="" alt="Display 6"></div></div>
        <div class="all-item a7"><div class="slide-cell"><img class="img-a" src="" alt="Display 7"><img class="img-b" src="" alt="Display 7"></div></div>
        <div class="all-item a8"><div class="slide-cell"><img class="img-a" src="" alt="Display 8"><img class="img-b" src="" alt="Display 8"></div></div>
      </div>
    </section>

    <div id="memberSections"></div>

  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose" aria-label="ปิด">&times;</button>
    <button class="lightbox-prev" id="lightboxPrev" aria-label="ก่อนหน้า">&#10094;</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
    <button class="lightbox-next" id="lightboxNext" aria-label="ถัดไป">&#10095;</button>
  </div>

  <script src="supabase.js"></script>
  <script>
    // Menu item stagger delay - triggered after quiz
    function triggerMenuAnimation() {
      document.querySelectorAll('.menu-item').forEach((item, i) => {
        setTimeout(() => item.classList.add('drop-in'), i * 80);
      });
    }

    // Quiz
    const quizScreen = document.getElementById('quizScreen');
    const feedback = document.getElementById('quizFeedback');

    document.querySelectorAll('.quiz-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.correct === 'true') {
          btn.classList.add('correct');
          feedback.textContent = '';
          setTimeout(() => {
            quizScreen.style.opacity = '0';
            quizScreen.style.transition = 'opacity 0.6s ease';
            launchConfetti();
            setTimeout(() => {
              quizScreen.style.display = 'none';
              const header = document.querySelector('header');
              header.classList.remove('header-hidden');
              header.classList.add('header-slide-in');
              triggerMenuAnimation();
            }, 600);
          }, 500);
        } else {
          btn.classList.add('wrong');
          feedback.textContent = 'ไม่ถูกต้อง ลองใหม่อีกครั้ง';
          setTimeout(() => { btn.classList.remove('wrong'); feedback.textContent = ''; }, 1000);
        }
      });
    });

    // Confetti
    function launchConfetti() {
      const canvas = document.getElementById('confetti');
      const ctx = canvas.getContext('2d');
      canvas.style.display = 'block';
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const colors = ['#c4b8a8','#8a7968','#e0dbd4','#5a5248','#d4cdc4','#f5f2ee','#a09080'];
      const pieces = Array.from({ length: 80 }, () => ({
        x: Math.random() * canvas.width,
        y: -10 - Math.random() * 100,
        w: 6 + Math.random() * 6,
        h: 3 + Math.random() * 4,
        color: colors[Math.floor(Math.random() * colors.length)],
        rot: Math.random() * Math.PI * 2,
        vx: (Math.random() - 0.5) * 1.5,
        vy: 1.5 + Math.random() * 2,
        vr: (Math.random() - 0.5) * 0.1,
        opacity: 1
      }));

      let frame;
      let elapsed = 0;

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        elapsed++;
        let alive = false;
        pieces.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          p.rot += p.vr;
          if (elapsed > 80) p.opacity -= 0.012;
          if (p.opacity > 0 && p.y < canvas.height + 20) {
            alive = true;
            ctx.save();
            ctx.globalAlpha = Math.max(0, p.opacity);
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();
          }
        });
        if (alive) { frame = requestAnimationFrame(draw); }
        else { canvas.style.display = 'none'; cancelAnimationFrame(frame); }
      }
      draw();
    }

    // Load data from Supabase
    async function loadSiteData() {
      const members = await getMembers();
      const allPhotos = await getAllPhotos();
      const settings = await getSettings();

      // Build menu
      const menu = document.getElementById('menu');
      menu.innerHTML = '';
      members.forEach((m, i) => {
        const avatar = m.avatar_url || `https://picsum.photos/seed/${m.id}/200/200`;
        const a = document.createElement('a');
        a.href = '#' + m.id;
        a.className = 'menu-item' + (i === 0 ? ' active' : '');
        a.innerHTML = `<div class="avatar"><img src="${avatar}" alt="${m.name}"></div><span>${m.name}</span>`;
        menu.appendChild(a);
      });

      // Update quote from settings
      if (settings.quote_text) {
        const bq = document.querySelector('.section-quote blockquote');
        if (bq) {
          bq.childNodes[0].textContent = settings.quote_text + ' ';
          const cite = bq.querySelector('cite');
          if (cite && settings.quote_author) cite.textContent = settings.quote_author;
        }
      }

      // Build member sections (skip display, it's already in HTML)
      const container = document.getElementById('memberSections');
      container.innerHTML = '';
      const nonDisplay = members.filter(m => m.id !== 'display');

      for (const m of nonDisplay) {
        const photos = allPhotos.filter(p => p.member_id === m.id);
        const sec = document.createElement('section');
        sec.id = m.id;

        let html = `<div class="section-title">${m.name}</div>`;

        if (photos.length > 0) {
          html += '<div class="all-grid">';
          const classes = ['a1','a2','a3','a4','a5','a6','a7','a8'];
          photos.slice(0, 8).forEach((p, i) => {
            html += `<div class="all-item ${classes[i] || ''}"><img src="${p.url}" alt="${m.name}" loading="lazy"></div>`;
          });
          html += '</div>';
        } else {
          html += '<p style="color:#b0a898;font-size:0.8rem;padding:1rem 0;">ยังไม่มีรูปภาพ</p>';
        }

        sec.innerHTML = html;
        container.appendChild(sec);
      }

      // Display section: use all photos for slideshow
      const displayPhotos = allPhotos.filter(p => p.member_id === 'display');
      const allUrls = displayPhotos.length > 0 ? displayPhotos.map(p => p.url) : allPhotos.map(p => p.url);

      if (allUrls.length > 0) {
        initDisplaySlideshow(allUrls);
      }

      // Setup menu scroll & lightbox after DOM is built
      setupMenuScroll();
      setupLightbox();
    }

    function initDisplaySlideshow(urls) {
      const cells = document.querySelectorAll('#allMosaic .slide-cell');
      let pool = shuffle([...urls]);
      let poolIdx = 0;

      function nextUrl() {
        if (poolIdx >= pool.length) { pool = shuffle([...urls]); poolIdx = 0; }
        return pool[poolIdx++];
      }

      cells.forEach(cell => {
        const imgA = cell.querySelector('.img-a');
        const imgB = cell.querySelector('.img-b');
        imgA.src = nextUrl();
        imgB.src = nextUrl();
        cell._active = 'a';
      });

      function pushCell(cell) {
        const imgA = cell.querySelector('.img-a');
        const imgB = cell.querySelector('.img-b');
        const isA = cell._active === 'a';
        const current = isA ? imgA : imgB;
        const next = isA ? imgB : imgA;
        const url = nextUrl();

        next.style.transition = 'none';
        next.style.transform = 'translateX(100%)';
        next.style.zIndex = '2';
        current.style.zIndex = '1';

        const doSlide = () => {
          requestAnimationFrame(() => requestAnimationFrame(() => {
            const t = 'transform 0.7s ease-in-out';
            next.style.transition = t;
            current.style.transition = t;
            next.style.transform = 'translateX(0%)';
            current.style.transform = 'translateX(-100%)';
            cell._active = isA ? 'b' : 'a';
          }));
        };

        next.onload = doSlide;
        next.src = url;
      }

      cells.forEach((cell, i) => {
        const interval = 5000 + Math.random() * 3000;
        setTimeout(() => { pushCell(cell); setInterval(() => pushCell(cell), interval); }, i * 800 + Math.random() * 1000);
      });
    }

    function setupMenuScroll() {
      document.querySelectorAll('.menu-item').forEach(link => {
        link.addEventListener('click', e => {
          e.preventDefault();
          const target = document.querySelector(link.getAttribute('href'));
          if (target) target.scrollIntoView({ behavior: 'smooth' });
          document.querySelectorAll('.menu-item').forEach(a => a.classList.remove('active'));
          link.classList.add('active');
        });
      });

      window.addEventListener('scroll', () => {
        let current = '';
        document.querySelectorAll('section').forEach(sec => {
          if (window.scrollY >= sec.offsetTop - 120) current = sec.id;
        });
        document.querySelectorAll('.menu-item').forEach(a => {
          a.classList.toggle('active', a.getAttribute('href') === '#' + current);
        });
      });
    }

    function setupLightbox() {
      const imgs = document.querySelectorAll('.all-item img:not(.img-b)');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      let idx = 0;

      function open(i) { idx = i; lightboxImg.src = imgs[i].src; lightbox.classList.add('active'); document.body.style.overflow = 'hidden'; }
      function close() { lightbox.classList.remove('active'); document.body.style.overflow = ''; }
      function nav(d) { idx = (idx + d + imgs.length) % imgs.length; lightboxImg.src = imgs[idx].src; }

      imgs.forEach((img, i) => img.addEventListener('click', () => open(i)));
      document.getElementById('lightboxClose').addEventListener('click', close);
      document.getElementById('lightboxPrev').addEventListener('click', () => nav(-1));
      document.getElementById('lightboxNext').addEventListener('click', () => nav(1));
      lightbox.addEventListener('click', e => { if (e.target === lightbox) close(); });
      document.addEventListener('keydown', e => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'Escape') close();
        if (e.key === 'ArrowLeft') nav(-1);
        if (e.key === 'ArrowRight') nav(1);
      });
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // Init on page load
    loadSiteData();
  </script>
</body>
</html>
